name: proxy_pinger
description: Fast proxy checker for Telegram proxies
publish_to: 'none'
version: 1.0.3+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Навигация
  go_router: ^14.6.2
  
  # Управление состоянием (без кодогенерации для простоты)
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  
  # База данных (Hive)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  
  # UI
  flutter_slidable: ^3.1.1
  file_picker: ^8.1.2
  share_plus: ^10.1.2
  url_launcher: ^6.3.1
  
  # Сеть
  socks5_proxy: ^1.0.0
  dio: ^5.7.0
  
  # Утилиты
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1  # Добавь эту строку
  # Убираем конфликтующие генераторы, будем использовать Isar без кодогенерации
  # или заменим на ObjectBox (проще в использовании)

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png

# ========== НАСТРОЙКИ ИКОНКИ ==========
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#FFFFFF"  # Белый фон (или выбери свой цвет)
  adaptive_icon_foreground: "assets/icon.png"
  min_sdk_android: 21